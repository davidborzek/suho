# cargo-deny configuration. Run `cargo deny check`.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive deps plus GPL-3.0-or-later (suho itself, rustables, rustables-macros).
allow = [
    "GPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
# Duplicate versions bloat the binary but are common in practice — warn only.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
